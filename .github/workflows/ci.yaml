name: CI

on:
  pull_request: {}
  push:
    branches:
    - master
    - release/*

jobs:
  ci:
    runs-on : ubuntu-latest
    container:
      image: rancher/dapper:v0.6.0
    steps:
    - name: Add Git
      run: apk add -U git
    - name: Checkout code
      # https://github.com/actions/checkout/releases/tag/v4.1.1
      uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
    - name : Run dapper ci
      run: dapper ci
